<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>SoundCheck - Real-time Audio Streaming</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; } .container { width: 100%; max-width: 700px; padding: 40px; } h1 { font-size: 2.5rem; margin-bottom: 10px; text-align: center; } .subtitle { text-align: center; color: #888; margin-bottom: 30px; } .mode-selector { display: flex; gap: 20px; margin-bottom: 30px; } .mode-btn { flex: 1; padding: 20px; border: 2px solid #333; border-radius: 12px; background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; } .mode-btn:hover { background: rgba(255, 255, 255, 0.1); } .mode-btn.active { border-color: #00d9ff; background: rgba(0, 217, 255, 0.1); } .mode-btn.active.sender { border-color: #ff6b6b; background: rgba(255, 107, 107, 0.1); } .mode-btn.active.receiver { border-color: #4ecdc4; background: rgba(78, 205, 196, 0.1); } .panel { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 25px; margin-bottom: 20px; } .panel h2 { font-size: 1.3rem; margin-bottom: 15px; } .hidden { display: none; } .device-list { max-height: 200px; overflow-y: auto; } .device-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; margin-bottom: 10px; } .device-info { display: flex; flex-direction: column; } .device-name { font-weight: 500; } .device-ip { font-size: 0.85rem; color: #888; } .connect-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; } .connect-btn.connect { background: #4ecdc4; color: #1a1a2e; } .connect-btn.disconnect { background: #ff6b6b; color: #fff; } .connect-btn:hover { transform: scale(1.05); } .status-bar { display: flex; align-items: center; gap: 10px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; margin-top: 20px; } .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #666; } .status-indicator.connected { background: #4ecdc4; animation: pulse 2s infinite; } .status-indicator.streaming { background: #ff6b6b; animation: pulse 1s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } } .control-btn { padding: 15px 30px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; } .control-btn.start { background: linear-gradient(135deg, #4ecdc4, #44a08d); color: #fff; } .control-btn.stop { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; } .control-btn:disabled { opacity: 0.5; cursor: not-allowed; } .audio-level { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin-top: 15px; overflow: hidden; } .audio-level-bar { height: 100%; background: linear-gradient(90deg, #4ecdc4, #44a08d); border-radius: 2px; transition: width 0.1s; } .settings-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; } .settings-row label { min-width: 100px; color: #888; } .settings-row select, .settings-row input { flex: 1; padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid #333; border-radius: 6px; color: #fff; } </style> </head> <body> <div class="container"> <h1>SoundCheck</h1> <p class="subtitle">Real-time Audio Streaming over Local Network</p> <div class="mode-selector"> <button class="mode-btn" id="senderBtn" onclick="setMode('sender')"> Sender Stream Audio </button> <button class="mode-btn" id="receiverBtn" onclick="setMode('receiver')"> Receiver Play Audio </button> </div> <div id="senderPanel" class="panel hidden"> <h2>Sender Settings</h2> <div class="settings-row"> <label>Audio Input:</label> <select id="audioInput"></select> </div> <div class="settings-row"> <label>Quality:</label> <select id="quality"> <option value="low">Low (32kbps)</option> <option value="medium" selected>Medium (64kbps)</option> <option value="high">High (128kbps)</option> </select> </div> <div class="settings-row"> <label>Port:</label> <input type="number" id="port" value="4000" min="1000" max="65535"> </div> <button class="control-btn start" id="startBtn" onclick="toggleStreaming()">Start Streaming</button> <div class="audio-level"> <div class="audio-level-bar" id="audioLevel" style="width: 0%"></div> </div> </div> <div id="receiverPanel" class="panel hidden"> <h2>Available Devices</h2> <div class="device-list" id="deviceList"> <p style="color: #888;">Scanning for devices...</p> </div> </div> <div class="status-bar"> <div class="status-indicator" id="statusIndicator"></div> <span id="statusText">Disconnected</span> </div> </div> <script src="renderer.js"></script> </body> </html>
